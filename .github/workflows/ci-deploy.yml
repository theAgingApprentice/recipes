name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Build and restart container
        run: |
          # TEMPLATE: replace recipes with your actual service name
          docker compose build --no-cache
          docker compose up -d --no-deps recipes

      - name: Health check
        run: |
          sleep 5
          # TEMPLATE: replace /recipes/health with your actual health endpoint
          curl -sf https://mitchellnet.local/recipes/health \
            -H "X-API-Key: ${API_KEY}" || \
            (docker compose logs recipes --tail=50 && exit 1)
        env:
          API_KEY: ${{ secrets.API_KEY }}
