name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Build and restart container
        run: |
          rsync -a --exclude='.git' --exclude='.env' \
            $GITHUB_WORKSPACE/ ~/services/recipes/
          cd ~/services/recipes
          docker compose build --no-cache
          docker compose up -d --no-deps recipes-app

      - name: Health check
        run: |
          sleep 10
          curl -sf https://mitchellnet.local/recipes/api/health || \
            (cd ~/services/recipes && docker compose logs recipes-app --tail=50 && exit 1)
