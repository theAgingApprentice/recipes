<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MitchellNET Recipes{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    nav { background: #1a1a2e; color: #fff; padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: #ccc; text-decoration: none; font-size: 0.95rem; }
    nav a:hover, nav a.active { color: #fff; }
    nav .brand { font-weight: 700; font-size: 1.05rem; color: #fff; margin-right: auto; }
    main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1rem; }
    h2 { font-size: 1.2rem; margin-bottom: 0.75rem; }
    .btn { display: inline-block; padding: 0.45rem 1rem; border-radius: 4px; border: none; cursor: pointer; font-size: 0.9rem; text-decoration: none; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #e5e7eb; color: #222; }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th { background: #f1f5f9; text-align: left; padding: 0.6rem 0.8rem; font-size: 0.85rem; color: #555; }
    td { padding: 0.6rem 0.8rem; border-top: 1px solid #e5e7eb; font-size: 0.9rem; vertical-align: top; }
    tr:hover td { background: #f9fafb; }
    .card { background: #fff; border-radius: 6px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1rem; }
    .filters { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1rem; }
    .filters label { font-size: 0.82rem; color: #555; display: flex; flex-direction: column; gap: 0.25rem; }
    select, input[type=text], input[type=url], input[type=number], textarea {
      border: 1px solid #d1d5db; border-radius: 4px; padding: 0.4rem 0.6rem; font-size: 0.9rem; width: 100%; }
    select:focus, input:focus, textarea:focus { outline: 2px solid #2563eb; border-color: transparent; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }
    .form-group label { font-size: 0.85rem; color: #444; font-weight: 500; }
    .form-group.full { grid-column: 1 / -1; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; background: #e0f2fe; color: #0369a1; }
    .badge-green { background: #dcfce7; color: #166534; }
    .empty { text-align: center; color: #888; padding: 3rem 1rem; }
    .actions { display: flex; gap: 0.5rem; align-items: center; }
    .tag { display: inline-block; background: #f1f5f9; border-radius: 4px; padding: 0.1rem 0.4rem; font-size: 0.8rem; color: #555; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">🍽 MitchellNET Recipes</span>
    <a href="/recipes/">Browse</a>
    <a href="/meal-plan/">Meal Plan</a>
    <a href="/shopping-list/">Shopping List</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
