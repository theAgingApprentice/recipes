{% extends "base.html" %}
{% block title %}Edit Cook Log Entry{% endblock %}
{% block content %}
<h1>Edit Cook Entry</h1>
<p style="color:#555; font-size:0.9rem; margin-bottom:1.5rem;">
  For: <a href="/recipes/{{ entry.recipe_id }}">{{ entry.recipe.name }}</a>
</p>

<form method="post" class="card">
  <div class="form-grid">
    <div class="form-group">
      <label for="cooked_on">Date Cooked</label>
      <input type="date" id="cooked_on" name="cooked_on" value="{{ entry.cooked_on }}">
    </div>
    <div class="form-group">
      <label for="rating">Rating</label>
      <select id="rating" name="rating">
        <option value="">— no rating —</option>
        {% for n in [1,2,3,4,5] %}
        <option value="{{ n }}" {% if entry.rating == n %}selected{% endif %}>
          {{ '★' * n }}{{ '☆' * (5 - n) }} ({{ n }})
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group full">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="3">{{ entry.notes or '' }}</textarea>
    </div>
  </div>
  <div class="actions" style="margin-top:1rem;">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="/recipes/{{ entry.recipe_id }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
