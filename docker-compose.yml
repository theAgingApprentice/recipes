services:
  recipes-app:
    build: .
    container_name: recipes-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      recipes-db:
        condition: service_healthy
    volumes:
      - recipes_uploads:/app/uploads
    networks:
      - mitchellnet
      - recipes-internal

  recipes-db:
    image: mariadb:11
    container_name: recipes-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - recipes_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - recipes-internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  recipes_data:
  recipes_uploads:

networks:
  mitchellnet:
    external: true
  recipes-internal:
    internal: true
